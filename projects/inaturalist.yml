summary: > 
  This project applies computer vision and machine learning to iNaturalist
  citizen science data to improve species identification quality, targeting
  the large share of observations stuck in "needs ID" status. The team is
  developing automated pipelines to classify species from images, model
  annotator reliability, and expand the pool of research grade observations
  available to ecologists and biodiversity researchers. Work centers on two
  taxonomic groups (Amanita fungi and Bombus bumblebees), fine tuning
  pre trained vision models (BioCLIP, DINOv3, ConvNext, EfficientNet) and
  building tools for candidate validation, annotator reliability analysis,
  and multi image aggregation. The project is scoped as a post processing
  tool built on publicly released iNat data rather than an integration into
  iNat's own platform, given community sensitivity around AI tools.
