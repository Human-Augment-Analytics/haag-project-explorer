summary: >
  The goal of this project is to leverage 3D generative AI for exploring vertebrae of both fossil and modern lizards. This project utilizes a Neural Shape Model (NSM), built on Meta AI’s DeepSDF (Deep Signed Distance Function). Our dataset consists of 3D surface models of over 2,000 vertebrae from a phylogenetically-diverse set of lizard species.
