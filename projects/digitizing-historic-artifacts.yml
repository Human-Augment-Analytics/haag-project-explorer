summary: > 
  The Georgia Trust for Historic Preservation works to preserve and revitalize Georgia’s historic resources and to increase public appreciation, protection, and use of historic places. The organization also operates historic house museums and develops educational and preservation resources.
  This project will support the digitization of historic artifacts associated with the Georgia Trust. Researchers will help develop a consistent process for creating, organizing, and documenting digital representations of collection materials so they can be preserved, studied, and made more accessible. 
