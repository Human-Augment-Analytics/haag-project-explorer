summary: >
  This research explores a compact, theoretically grounded approach to unsupervised, post-hoc out-of-distribution detection using only in-distribution data for fitting and calibration. 
  The central idea connects classical kernel methods with modern attention mechanisms to measure how strongly a learned in-distribution supports a test input. 
  The resulting framework is designed to identify both near- and far-out-of-distribution inputs without retaining raw training samples or large feature banks at inference time. 
  It also incorporates confidence-aware scoring to reduce overconfident predictions on unsupported inputs and provides theoretical guarantees characterizing its detection behavior. 
  Experiments across CIFAR and ImageNet benchmarks demonstrate competitive performance while offering lower memory requirements and more practical deployment assumptions.
