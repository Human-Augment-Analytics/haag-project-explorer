summary: >
  This research introduces Kernel Attention OOD, an unsupervised, post-hoc method for distinguishing in-distribution inputs from both near- and far-out-of-distribution inputs using only in-distribution data for fitting and calibration, without retaining raw training samples or feature banks at inference time. 
  Its central insight is that prediction in a reproducing kernel Hilbert space can be interpreted as query–key–value attention, allowing OOD detection to be reframed as measuring how strongly the in-distribution attends to a test input. 
  The framework provides two distinct compact approximations of this kernel attention mass: one uses random Fourier features to store an empirical mean embedding, while the other represents the distribution through a weighted set of learned anchor points. 
  The estimated attention mass can also gate a classifier’s confidence, suppressing highly confident predictions that lack in-distribution support. 
  Theoretically, the method provides finite-sample bounds on false-positive and missed-detection rates under a score-separation condition; for shift-invariant kernels, attention mass also provably decays as an input moves away from the in-distribution support, providing an especially strong foundation for far-OOD detection. 
  Experiments across CIFAR and ImageNet benchmarks indicate that these methods are competitive with established OOD detectors while offering lower memory requirements and more practical deployment assumptions.
